# Form 1040 — U.S. Individual Income Tax Return
# Authority: 26 U.S.C. §§ 1, 2, 6012; IRS Form 1040 instructions.
# https://www.irs.gov/forms-pubs/about-form-1040
#
# Y2 / P5 form-schema-as-data: line numbers track the 2024 revision
# (2025 retains the same line numbering at publication time —
# confirm against the official IRS 2025 PDF before filing).
# Schedule 8812 reshuffled lines in 2022 and 2024; Form 1040 lines
# 26/27/28 ordering tweaked in 2023 — the schema makes a 2026
# renumber a TOML edit rather than a Python-string edit hunt.
#
# Only the populated lines for the supported U.S. cross-border
# posture are declared (the ~22 lines the renderer touches; lines
# 4-6, 9-10, 13-14, 18, 21, 24-25, 27, 29-34, 35b-c, 36, 38 are not
# modeled and not declared here).

form_id = "form_1040"
form_year = 2025
display_name = "Form 1040"
canonical_form_name = "Form 1040"
authority_url = "https://www.irs.gov/forms-pubs/about-form-1040"

# Header / posture labels (non-line, non-statutory) — declared so the
# renderer can read every visible label from the schema. These rows
# are not statutory form lines (filing status, spouse name fields,
# digital-assets checkbox).

[[lines]]
line_id = "filing_status_label"
label = "Filing status"

[[lines]]
