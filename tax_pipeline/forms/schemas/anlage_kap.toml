# Anlage KAP 2025 — Capital Income (per-person)
# Authority: § 20 EStG, § 32d EStG, § 43 EStG; ELSTER Anlage KAP
# instructions.
# https://www.gesetze-im-internet.de/estg/__20.html
# https://www.gesetze-im-internet.de/estg/__32d.html
#
# Y2 / P5 form-schema-as-data. Per-person Anlage KAP is rendered from
# a configurable kap_lines list per person_slot in profile.json. The
# schema declares every Zeile the renderer might surface; the
# renderer looks up labels by line_id. Adding a new KAP Zeile to a
# workspace requires a [[lines]] entry here AND a kap_lines entry in
# profile.json.

form_id = "anlage_kap"
form_year = 2025
display_name = "Anlage KAP"
canonical_form_name = "Anlage KAP"
authority_url = "https://www.gesetze-im-internet.de/estg/__20.html"

# Lines the brenn-2025 / demo-2025 person_1 + person_2 + de-only-demo
# postures touch. Each label is the rendered string the renderer
# emits — "Anlage KAP Zeile <N>".

[[lines]]
line_id = "4"
label = "Anlage KAP Zeile 4"

[[lines]]
line_id = "5"
label = "Anlage KAP Zeile 5"

