[RETIREMENT_SPECIAL_EXPENSE_CAP_SINGLE_EUR]
value = "29344.00"
authority = "§ 10 Abs. 3 Satz 1 EStG: the Höchstbetrag for retirement Vorsorgeaufwendungen equals the maximum (employer + employee) annual contribution to the knappschaftliche Rentenversicherung. The BMAS Sozialversicherungs-Rechengrößenverordnung 2025 abolished the West/Ost split — for 2025 there is a single bundeseinheitliche BBG of €118,800 in the knappschaftliche RV, and the contribution rate is 24.7 %, so: €118,800 × 0.247 = €29,343.60 → rounded by BMF to €29,344. The legacy \"_RV_WEST_\" suffix on the constant name is retained for fingerprint stability under invariants I1 / I2; the value is correct for the unified 2025 BBG."
citation_url = "https://www.gesetze-im-internet.de/estg/__10.html"

