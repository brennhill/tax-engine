[STATUTORY_HEALTH_SICK_PAY_REDUCTION_RATE]
value = "0.04"
authority = "§ 10 Abs. 1 Nr. 3 Satz 4 EStG: statutory health insurance contributions entitled to Krankengeld must be reduced by 4 % to isolate the deductible basic-health portion. The default 4 % rate applies unless workspace facts show a different non-deductible share."
citation_url = "https://www.gesetze-im-internet.de/estg/__10.html"
