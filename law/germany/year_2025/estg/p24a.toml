# § 24a EStG (Altersentlastungsbetrag)
#
# Authority root: https://www.gesetze-im-internet.de/estg/__24a.html
#
# Migrated per W2.A / T1.2 of .review/2026-05-11-implementation-plan.md
# (deferred F1 tables to TOML). § 24a Satz 5 EStG Anlage — sliding
# scale keyed by the calendar year the taxpayer first turned 64
# (Vollendung des 64. Lebensjahres). Once established, the (rate, cap)
# is fixed for life. The 2024-anchored rate of 11.2 % / €532 carries
# forward to 2025. The Anlage below covers cohorts 2005-2025 that may
# still apply to 2025 returns.
#
# F-C6 — Wachstumschancengesetz (28.03.2024, BGBl. I 2024 Nr. 108)
# re-keyed the § 24a Anlage from cohort year 2023 forward: the per-
# cohort rate-step halved from 0.4 percentage points to 0.2, so the
# 2023 cap is €665 (NOT €684, which would silently re-use the 2022
# cap and over-credit anyone who turned 64 in 2023).

