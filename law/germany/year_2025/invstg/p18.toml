[VORABPAUSCHALE_BASISERTRAG_FACTOR]
value = "0.7"
authority = "§ 18 Abs. 1 Satz 1 InvStG: Basisertrag = NAV_start × 0,7 × Basiszinssatz × (months_held / 12). The 0,7 factor is the statutory shortfall (70 % of the risk-free rate) that § 18 InvStG applies to the prior-year NAV."
citation_url = "https://www.gesetze-im-internet.de/invstg_2018/__18.html"

[BASISZINS_2025]
value = "0.0253"
authority = "BMF-Schreiben 16.01.2025 - IV C 1 - S 1980-1/19/10005:008 — the 2025 Basiszinssatz (2,53 %) used by InvStG § 18 to compute the Vorabpauschale Basisertrag. Source: BMF Investmentfonds page (annual Basiszinssatz announcements)."
citation_url = "https://www.bundesfinanzministerium.de/Content/DE/Downloads/BMF_Schreiben/Steuerarten/Investmentsteuergesetz/2025-01-16-basiszins-zur-berechnung-der-vorabpauschale.pdf?__blob=publicationFile&v=2"
